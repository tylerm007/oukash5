<div class="container">
<o-form-container breadcrumb="yes" breadcrumb-label-columns="NAME" breadcrumb-separator=", " class="fill-form">
      <o-form #form attr="PLANTTB_form_edit" 
        service="PLANTTB" 
        entity="PLANTTB" 
        fxLayout="column" 
        show-header="yes" 
        header-actions="R;U;D"
        #oDetailForm keys="PLANT_ID" 
        keys-sql-types="INTEGER" 
        show-header-navigation="yes"
        (onDataLoaded)="onDataLoaded($event)">

  <o-row attr="row1" layout-align="start stretch">
    <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">
      
      <o-text-input #NAME attr="NAME" label="Plant Name" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #PLANT_ID attr="PLANT_ID" label="PLANT_ID" type="integer" editable="no" required="yes" ></o-integer-input>
      
      <o-checkbox #GP_NOTIFY attr="GP_NOTIFY" label="GP_NOTIFY" read-only="no" enabled="yes"></o-checkbox>
      
      <o-text-input #MULTILINES attr="MULTILINES" label="MULTILINES" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #PASSOVER attr="PASSOVER" label="PASSOVER" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #SPECIAL_PROD attr="SPECIAL_PROD" label="SPECIAL_PROD" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #JEWISH_OWNED attr="JEWISH_OWNED" label="JEWISH_OWNED" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #PLANT_TYPE attr="PLANT_TYPE" label="PLANT_TYPE" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #PLANT_DIRECTIONS attr="PLANT_DIRECTIONS" label="PLANT_DIRECTIONS" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #ACTIVE attr="ACTIVE" label="ACTIVE" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-text-input #USDA_CODE attr="USDA_CODE" label="USDA_CODE" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #PlantUID attr="PlantUID" label="PlantUID" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #DoNotAttach attr="DoNotAttach" label="DoNotAttach" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #OtherCertification attr="OtherCertification" label="OtherCertification" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-list-picker 
        attr="PrimaryCompany"
        service="COMPANYTB" 
        entity="COMPANYTBType"
        fxFlex="30" 
        query-on-init="no" 
        query-on-bind="yes" 
        required="no" 
        enabled="yes" 
        filter="yes"
        value-column="COMPANY_ID" 
        value-column-type="INTEGER"  
        keys="COMPANY_ID" 
        columns="COMPANY_ID;PrimaryCompany;NAME" 
        title="PrimaryCompany"
        visible-columns="COMPANY_ID;NAME" 
        separator=" - " width="680px" class="form-field">
</o-list-picker>
      
      <o-integer-input #DesignatedRFR attr="DesignatedRFR" label="DesignatedRFR" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-text-input #ValidFromTime attr="ValidFromTime" label="ValidFromTime" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #ValidToTime attr="ValidToTime" label="ValidToTime" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #CHANGESET_ID attr="CHANGESET_ID" label="CHANGESET_ID" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-integer-input #MaxOnSiteVisits attr="MaxOnSiteVisits" label="MaxOnSiteVisits" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-integer-input #MaxVirtualVisits attr="MaxVirtualVisits" label="MaxVirtualVisits" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-checkbox #IsDaily attr="IsDaily" label="IsDaily" read-only="no" enabled="yes"></o-checkbox>
      
    </div>
  </o-row>
      
      <mat-tab-group fxFill>
        
        <mat-tab label="OWNSTB-PLANT_ID">
    <div layout-padding>
      <o-table 
        attr="OWNSTBTable" 
        service="OWNSTB" 
        entity="OWNSTB" 
        keys="ID"
        parent-keys="PLANT_ID:PLANT_ID"
        columns="ID;COMPANY_ID;PLANT_ID;START_DATE;END_DATE;TYPE;VISIT_FREQUENCY;INVOICE_TYPE;INVOICE_FREQUENCY;INVOICE_DTL;HOLD;ROYALTIES;SPECIAL_TICKET;STATUS;ACTIVE;Setup_By;AcquiredFrom;NoRFRneeded;LOCtext;MoveToGP;DefaultPO;VisitBilling;PlantName;ShareAB;POexpiry;BillingName;PLANT_BILL_TO_NAME;AutoCertification;primaryCompany;Override;VisitPO;VisitPOexpiry;ValidFromTime;ValidToTime;CHANGESET_ID;BoilerplateInvoiceComment;IsCertBillingOverride"  
        horizontal-scroll="yes"
        detail-form-route="OWNSTB" 
        edit-form-route="OWNSTB"
        visible-columns="ID;COMPANY_ID;PLANT_ID;START_DATE;END_DATE;TYPE;VISIT_FREQUENCY;INVOICE_TYPE;INVOICE_FREQUENCY;INVOICE_DTL;HOLD;ROYALTIES;SPECIAL_TICKET;STATUS;ACTIVE;Setup_By;AcquiredFrom;NoRFRneeded;LOCtext;MoveToGP;DefaultPO;VisitBilling;PlantName;ShareAB;POexpiry;BillingName;PLANT_BILL_TO_NAME;AutoCertification;primaryCompany;Override;VisitPO;VisitPOexpiry;ValidFromTime;ValidToTime;CHANGESET_ID;BoilerplateInvoiceComment;IsCertBillingOverride"  
        sort-columns="ID" 
        query-rows="25" 
        quick-filter="yes"
        row-height="medium" 
        select-all-checkbox="true" 
        pageable="yes"  
        auto-adjust="true" 
        virtual-scroll="yes" 
        insert-button="yes" 
        delete-button="yes" 
        fixed-header="true" 
        class="vertical-padding-8"
        edition-mode="dblclick" 
        horizontal-scroll="yes" class="fill-form">
        
          <o-table-column #ID attr="ID" title="ID" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
        
          <o-table-column attr="COMPANY_ID" title="COMPANY_ID">
    <o-table-cell-renderer-service attr="COMPANY_ID" 
        service="COMPANYTB" entity="COMPANYTBType" columns="COMPANY_ID;NAME"
        parent-keys="PLANT_ID:COMPANY_ID"
        value-column="NAME" keys="COMPANY_ID"
        visible-columns="NAME" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
        
          <o-table-column attr="PLANT_ID" title="PLANT_ID">
    <o-table-cell-renderer-service attr="PLANT_ID" 
        service="PLANTTB" entity="PLANTTBType" columns="PLANT_ID;NAME"
        parent-keys="PLANT_ID:PLANT_ID"
        value-column="NAME" keys="PLANT_ID"
        visible-columns="NAME" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
        
          <o-table-column #START_DATE attr="START_DATE" title="START_DATE" type="DATETIME" editable="no" required="no" ></o-table-column>
        
          <o-table-column #END_DATE attr="END_DATE" title="END_DATE" type="DATETIME" editable="no" required="no" ></o-table-column>
        
          <o-table-column #TYPE attr="TYPE" title="TYPE" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #VISIT_FREQUENCY attr="VISIT_FREQUENCY" title="VISIT_FREQUENCY" type="integer" editable="no" required="no" content-align="center"></o-table-column>
        
          <o-table-column #INVOICE_TYPE attr="INVOICE_TYPE" title="INVOICE_TYPE" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #INVOICE_FREQUENCY attr="INVOICE_FREQUENCY" title="INVOICE_FREQUENCY" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #INVOICE_DTL attr="INVOICE_DTL" title="INVOICE_DTL" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #HOLD attr="HOLD" title="HOLD" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #ROYALTIES attr="ROYALTIES" title="ROYALTIES" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #SPECIAL_TICKET attr="SPECIAL_TICKET" title="SPECIAL_TICKET" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #STATUS attr="STATUS" title="STATUS" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #ACTIVE attr="ACTIVE" title="ACTIVE" type="integer" editable="no" required="no" content-align="center"></o-table-column>
        
          <o-table-column #Setup_By attr="Setup_By" title="Setup_By" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #AcquiredFrom attr="AcquiredFrom" title="AcquiredFrom" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #NoRFRneeded attr="NoRFRneeded" title="NoRFRneeded" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #LOCtext attr="LOCtext" title="LOCtext" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #MoveToGP attr="MoveToGP" title="MoveToGP" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #DefaultPO attr="DefaultPO" title="DefaultPO" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #VisitBilling attr="VisitBilling" title="VisitBilling" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #PlantName attr="PlantName" title="PlantName" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #ShareAB attr="ShareAB" title="ShareAB" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #POexpiry attr="POexpiry" title="POexpiry" type="DATE" editable="no" required="no" ></o-table-column>
        
          <o-table-column #BillingName attr="BillingName" title="BillingName" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #PLANT_BILL_TO_NAME attr="PLANT_BILL_TO_NAME" title="PLANT_BILL_TO_NAME" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column attr="AutoCertification" title="AutoCertification">
    <o-table-cell-renderer-boolean render-true-value="check_circle" render-false-value="highlight_off"
        render-type="icon" boolean-type="boolean" true-value="true" false-value="false"></o-table-cell-renderer-boolean>
</o-table-column>
        
          <o-table-column #primaryCompany attr="primaryCompany" title="primaryCompany" type="integer" editable="no" required="no" content-align="center"></o-table-column>
        
          <o-table-column attr="Override" title="Override">
    <o-table-cell-renderer-boolean render-true-value="check_circle" render-false-value="highlight_off"
        render-type="icon" boolean-type="boolean" true-value="true" false-value="false"></o-table-cell-renderer-boolean>
</o-table-column>
        
          <o-table-column #VisitPO attr="VisitPO" title="VisitPO" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #VisitPOexpiry attr="VisitPOexpiry" title="VisitPOexpiry" type="DATETIME" editable="no" required="no" ></o-table-column>
        
          <o-table-column #ValidFromTime attr="ValidFromTime" title="ValidFromTime" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #ValidToTime attr="ValidToTime" title="ValidToTime" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #CHANGESET_ID attr="CHANGESET_ID" title="CHANGESET_ID" type="integer" editable="no" required="no" content-align="center"></o-table-column>
        
          <o-table-column #BoilerplateInvoiceComment attr="BoilerplateInvoiceComment" title="BoilerplateInvoiceComment" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column attr="IsCertBillingOverride" title="IsCertBillingOverride">
    <o-table-cell-renderer-boolean render-true-value="check_circle" render-false-value="highlight_off"
        render-type="icon" boolean-type="boolean" true-value="true" false-value="false"></o-table-cell-renderer-boolean>
</o-table-column>
        
        <o-table-paginator page-size-options="25;50;100"></o-table-paginator>
      </o-table>
    </div>
</mat-tab>
        
      </mat-tab-group>
      
    </o-form>
  </o-form-container>
</div>
