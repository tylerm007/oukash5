<o-form #WFUserRoleForm attr="WFUserRole_form_insert" service="WFUserRole" entity="WFUserRole"
keys="UserName;UserRole" fxLayout="column" show-header="yes" header-actions="I"
horizontal-scroll="yes"
after-insert-mode="new" class="standalone-form-container" >

<o-row attr="row1" layout-align="start stretch">
  <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">
    
        <o-list-picker 
        attr="UserName"
        service="WFUser" 
        entity="WFUserType"
        fxFlex="30" 
        query-on-init="no" 
        query-on-bind="yes" 
        required="yes" 
        enabled="yes" 
        filter="yes"
        value-column="Username" 
        value-column-type="VARCHAR"  
        keys="Username" 
        columns="Username;UserName;Username" 
        title="UserName"
        visible-columns="Username;Username" 
        separator=" - " width="680px" class="form-field">
</o-list-picker>
      
        <o-list-picker 
        attr="UserRole"
        service="WFRole" 
        entity="WFRoleType"
        fxFlex="30" 
        query-on-init="no" 
        query-on-bind="yes" 
        required="yes" 
        enabled="yes" 
        filter="yes"
        value-column="UserRole" 
        value-column-type="VARCHAR"  
        keys="UserRole" 
        columns="UserRole;UserRole;UserRole" 
        title="UserRole"
        visible-columns="UserRole;UserRole" 
        separator=" - " width="680px" class="form-field">
</o-list-picker>
      
        <o-date-input #CreatedDate attr="CreatedDate" value-type="string" label="CreatedDate" editable="no" required="yes" format="YYYY-MM-DD hh:mm:ss" fxFlex="20%" class="form-field"></o-date-input>
      
</div>
</o-row>

<div layout-padding></div>

</o-form>
