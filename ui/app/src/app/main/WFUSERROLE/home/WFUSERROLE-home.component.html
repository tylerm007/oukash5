<o-form-layout-manager attr="WFUSERROLE" mode="tab" title="WFUSERROLE">
    <div fxFill fxLayout="column" fxLayoutAlign="start">
        <o-table 
            attr="WFUSERROLETable" 
            service="WFUSERROLE" 
            entity="WFUSERROLE" 
            title="WFUSERROLE"
            keys="UserName;UserRole"
            columns="UserName;UserRole;CreatedDate" 
            header-actions="R;D"
            visible-columns="UserName;UserRole;CreatedDate"  
            sort-columns="UserName" 
            query-rows="20" 
            quick-filter="yes"
            row-height="medium" 
            select-all-checkbox="true" 
            pageable="yes"  
            auto-adjust="true" 
            virtual-scroll="yes" 
            edition-mode="dblclick"
            horizontal-scroll="yes"
            show-title="yes"
            export-button="yes">
            
            <o-table-column #UserName attr="UserName" title=" User Name" editable="no" required="yes" content-align="left"></o-table-column>
            
            <o-table-column #UserRole attr="UserRole" title="UserRole" editable="no" required="yes" content-align="left"></o-table-column>
            
            <o-table-column #CreatedDate attr="CreatedDate" title="CreatedDate" type="DATETIME2" editable="no" required="yes" ></o-table-column>
            
            <o-table-context-menu></o-table-context-menu>
            <o-table-paginator page-size-options="24;48;96"></o-table-paginator>
        </o-table>
    </div>
</o-form-layout-manager>
