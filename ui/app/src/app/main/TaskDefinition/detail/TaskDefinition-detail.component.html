<div class="container">
  <o-form-container breadcrumb="yes" breadcrumb-label-columns="TaskName" breadcrumb-separator=", " class="fill-form">
    <o-form #form attr="TaskDefinition_form_edit" service="TaskDefinition" entity="TaskDefinition" fxLayout="column"
      show-header="yes" header-actions="R;U;D" #oDetailForm keys="TaskId" keys-sql-types="INTEGER"
      show-header-navigation="yes" (onDataLoaded)="onDataLoaded($event)">

      <o-row attr="row1" layout-align="start stretch">
        <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">

          <o-text-input #TaskName attr="TaskName" label=" Task Name" enabled="yes" required="yes" fxFlex="20%"
            class="form-field"></o-text-input>

          <o-list-picker attr="ProcessDefinitionId" service="ProcessDefinition" entity="ProcessDefinitionType"
            fxFlex="30" query-on-init="no" query-on-bind="yes" required="yes" enabled="yes" filter="yes"
            value-column="ProcessId" value-column-type="INTEGER" keys="ProcessId"
            columns="ProcessId;ProcessDefinitionId;ProcessName" title="ProcessDefinition"
            visible-columns="ProcessId;ProcessName" separator=" - " width="680px" class="form-field">
          </o-list-picker>

          <o-list-picker attr="StageDefinitionId" service="StageDefinition" entity="StageDefinitionType" fxFlex="30"
            query-on-init="no" query-on-bind="yes" required="yes" enabled="yes" filter="yes" value-column="StageId"
            value-column-type="INTEGER" keys="StageId" columns="StageId;StageDefinitionId;StageName"
            title="StageDefinition" visible-columns="StageId;StageName" separator=" - " width="680px"
            class="form-field">
          </o-list-picker>

          <o-list-picker attr="TaskCategory" service="TaskCategory" entity="TaskCategoryType" fxFlex="30"
            query-on-init="no" query-on-bind="yes" required="no" enabled="yes" filter="yes"
            value-column="TaskCategoryCode" value-column-type="VARCHAR" keys="TaskCategoryCode"
            columns="TaskCategoryCode;TaskCategory;TaskCategoryDescription" title="TaskCategory"
            visible-columns="TaskCategoryCode;TaskCategoryDescription" separator=" - " width="680px" class="form-field">
          </o-list-picker>

          <o-list-picker attr="TaskType" service="TaskType" entity="TaskTypeType" fxFlex="30" query-on-init="no"
            query-on-bind="yes" required="yes" enabled="yes" filter="yes" value-column="TaskTypeCode"
            value-column-type="VARCHAR" keys="TaskTypeCode" columns="TaskTypeCode;TaskType;TaskTypeDescription"
            title="TaskType" visible-columns="TaskTypeCode;TaskTypeDescription" separator=" - " width="680px"
            class="form-field">
          </o-list-picker>

          <o-integer-input #Sequence attr="Sequence" label="Sequence" type="integer" editable="no"
            required="yes"></o-integer-input>

          <o-checkbox #IsParallel attr="IsParallel" label="IsParallel" read-only="no" enabled="yes"></o-checkbox>

          <o-text-input #AssigneeRole attr="AssigneeRole" label="AssigneeRole" enabled="yes" required="no" fxFlex="20%"
            class="form-field"></o-text-input>

          <o-integer-input #EstimatedDurationMinutes attr="EstimatedDurationMinutes" label="EstimatedDurationMinutes"
            type="integer" editable="no" required="no"></o-integer-input>

          <o-checkbox #AutoComplete attr="AutoComplete" label="AutoComplete" read-only="no" enabled="yes"></o-checkbox>

          <o-text-input #Description attr="Description" label="Description" enabled="yes" required="no" fxFlex="20%"
            class="form-field"></o-text-input>

          <o-date-input #CreatedDate attr="CreatedDate" value-type="string" label="CreatedDate" editable="no"
            required="yes" format="YYYY-MM-DD hh:mm:ss" fxFlex="20%" class="form-field"></o-date-input>

          <o-text-input #CreatedBy attr="CreatedBy" label="CreatedBy" enabled="yes" required="yes" fxFlex="20%"
            class="form-field"></o-text-input>

          <o-date-input #ModifiedDate attr="ModifiedDate" value-type="string" label="ModifiedDate" editable="no"
            required="no" format="YYYY-MM-DD hh:mm:ss" fxFlex="20%" class="form-field"></o-date-input>

          <o-text-input #ModifiedBy attr="ModifiedBy" label="ModifiedBy" enabled="yes" required="no" fxFlex="20%"
            class="form-field"></o-text-input>

          <o-text-input #PreScriptJson attr="PreScriptJson" label="PreScriptJson" enabled="yes" required="no"
            fxFlex="20%" class="form-field"></o-text-input>

          <o-text-input #PostScriptJson attr="PostScriptJson" label="PostScriptJson" enabled="yes" required="no"
            fxFlex="20%" class="form-field"></o-text-input>

          <o-integer-input #TaskId attr="TaskId" label="TaskId" type="integer" editable="no"
            required="no"></o-integer-input>

          <o-checkbox #IsRequired attr="IsRequired" label="IsRequired" read-only="no" enabled="yes"></o-checkbox>

        </div>
      </o-row>

      <mat-tab-group fxFill>

        <mat-tab label="TASKFLOW-FromTaskId">
          <div layout-padding>
            <o-table attr="TaskFlowTable" service="TaskFlow" entity="TaskFlow" keys="FlowId"
              parent-keys="FromTaskId:TaskId" columns="FlowId;FromTaskId;ToTaskId;Condition;IsDefault"
              horizontal-scroll="yes" detail-form-route="TaskFlow" edit-form-route="TaskFlow"
              visible-columns="FlowId;FromTaskId;ToTaskId;Condition;IsDefault" sort-columns="FlowId" query-rows="25"
              quick-filter="yes" row-height="medium" select-all-checkbox="true" pageable="yes" auto-adjust="true"
              virtual-scroll="yes" insert-button="yes" delete-button="yes" fixed-header="true"
              class="vertical-padding-8" edition-mode="dblclick" horizontal-scroll="yes" class="fill-form">

              <o-table-column #FlowId attr="FlowId" title=" Flow Id" type="integer" editable="no" required="no"
                content-align="center"></o-table-column>

              <o-table-column attr="FromTaskId" title="FromTask">
                <o-table-cell-renderer-service attr="FromTaskId" service="TaskDefinition" entity="TaskDefinitionType"
                  columns="TaskId;TaskName" parent-keys="TaskId:FromTaskId" value-column="TaskName" keys="FromTaskId"
                  visible-columns="TaskName" separator=" - " width="680px">
                </o-table-cell-renderer-service>
              </o-table-column>

              <o-table-column attr="ToTaskId" title="ToTask">
                <o-table-cell-renderer-service attr="ToTaskId" service="TaskDefinition" entity="TaskDefinitionType"
                  columns="TaskId;TaskName" parent-keys="TaskId:ToTaskId" value-column="TaskName" keys="ToTaskId"
                  visible-columns="TaskName" separator=" - " width="680px">
                </o-table-cell-renderer-service>
              </o-table-column>

              <o-table-column #Condition attr="Condition" title="Condition" editable="no" required="no"
                content-align="left"></o-table-column>

              <o-table-column attr="IsDefault" title="IsDefault">
                <o-table-cell-renderer-boolean render-true-value="check_circle" render-false-value="highlight_off"
                  render-type="icon" boolean-type="boolean" true-value="true"
                  false-value="false"></o-table-cell-renderer-boolean>
              </o-table-column>

              <o-table-paginator page-size-options="25;50;100"></o-table-paginator>
            </o-table>
          </div>
        </mat-tab>

        <mat-tab label="TASKFLOW-ToTaskId">
          <div layout-padding>
            <o-table attr="TaskFlowTable" service="TaskFlow" entity="TaskFlow" keys="FlowId"
              parent-keys="ToTaskId:TaskId" columns="FlowId;FromTaskId;ToTaskId;Condition;IsDefault"
              horizontal-scroll="yes" detail-form-route="TaskFlow" edit-form-route="TaskFlow"
              visible-columns="FlowId;FromTaskId;ToTaskId;Condition;IsDefault" sort-columns="FlowId" query-rows="25"
              quick-filter="yes" row-height="medium" select-all-checkbox="true" pageable="yes" auto-adjust="true"
              virtual-scroll="yes" insert-button="yes" delete-button="yes" fixed-header="true"
              class="vertical-padding-8" edition-mode="dblclick" horizontal-scroll="yes" class="fill-form">

              <o-table-column #FlowId attr="FlowId" title=" Flow Id" type="integer" editable="no" required="no"
                content-align="center"></o-table-column>

              <o-table-column attr="FromTaskId" title="FromTask">
                <o-table-cell-renderer-service attr="FromTaskId" service="TaskDefinition" entity="TaskDefinitionType"
                  columns="TaskId;TaskName" parent-keys="TaskId:FromTaskId" value-column="TaskName" keys="FromTaskId"
                  visible-columns="TaskName" separator=" - " width="680px">
                </o-table-cell-renderer-service>
              </o-table-column>

              <o-table-column attr="ToTaskId" title="ToTask">
                <o-table-cell-renderer-service attr="ToTaskId" service="TaskDefinition" entity="TaskDefinitionType"
                  columns="TaskId;TaskName" parent-keys="TaskId:ToTaskId" value-column="TaskName" keys="ToTaskId"
                  visible-columns="TaskName" separator=" - " width="680px">
                </o-table-cell-renderer-service>
              </o-table-column>

              <o-table-column #Condition attr="Condition" title="Condition" editable="no" required="no"
                content-align="left"></o-table-column>

              <o-table-column attr="IsDefault" title="IsDefault">
                <o-table-cell-renderer-boolean render-true-value="check_circle" render-false-value="highlight_off"
                  render-type="icon" boolean-type="boolean" true-value="true"
                  false-value="false"></o-table-cell-renderer-boolean>
              </o-table-column>

              <o-table-paginator page-size-options="25;50;100"></o-table-paginator>
            </o-table>
          </div>
        </mat-tab>

        <mat-tab label="TASKINSTANCE-TaskDefinitionId">
          <div layout-padding>
            <o-table attr="TaskInstanceTable" service="TaskInstance" entity="TaskInstance" keys="TaskInstanceId"
              parent-keys="TaskDefinitionId:TaskId"
              columns="TaskInstanceId;ApplicationId;StageId;Status;TaskDefinitionId;AssignedTo;StartedDate;CompletedDate;DurationMinutes;Result;ResultData;ErrorMessage;RetryCount;ModifiedDate"
              horizontal-scroll="yes" detail-form-route="TaskInstance" edit-form-route="TaskInstance"
              visible-columns="TaskInstanceId;ApplicationId;StageId;Status;TaskDefinitionId;AssignedTo;StartedDate;CompletedDate;DurationMinutes;Result;ResultData;ErrorMessage;RetryCount;ModifiedDate"
              sort-columns="TaskInstanceId" query-rows="25" quick-filter="yes" row-height="medium"
              select-all-checkbox="true" pageable="yes" auto-adjust="true" virtual-scroll="yes" insert-button="yes"
              delete-button="yes" fixed-header="true" class="vertical-padding-8" edition-mode="dblclick"
              horizontal-scroll="yes" class="fill-form">

              <o-table-column #TaskInstanceId attr="TaskInstanceId" title=" Task Instance Id" type="integer"
                editable="no" required="no" content-align="center"></o-table-column>

              <o-table-column attr="ApplicationId" title="Application" editable="no" required="yes"
                content-align="left">
                <!-- o-table-cell-renderer-service attr="ApplicationId" 
                  service="WFApplication" entity="WFApplicationType" columns="ApplicationID;ApplicationID"
                  parent-keys="TaskId:ApplicationId"
                  value-column="ApplicationID" keys="ApplicationId"
                  visible-columns="ApplicationID" separator=" - " width="680px">
              </o-table-cell-renderer-service -->
              </o-table-column>

              <o-table-column attr="StageId" title="Stage">
                <o-table-cell-renderer-service attr="StageId" service="StageDefinition" entity="StageDefinitionType"
                  columns="StageId;StageName" parent-keys="TaskId:StageId" value-column="StageName" keys="StageId"
                  visible-columns="StageName" separator=" - " width="680px">
                </o-table-cell-renderer-service>
              </o-table-column>

              <o-table-column #Status attr="Status" title="Status" editable="no" required="yes"
                content-align="left"></o-table-column>

              <o-table-column attr="TaskDefinitionId" title="TaskDefinition">
                <o-table-cell-renderer-service attr="TaskDefinitionId" service="TaskDefinition"
                  entity="TaskDefinitionType" columns="TaskId;TaskName" parent-keys="TaskId:TaskDefinitionId"
                  value-column="TaskName" keys="TaskDefinitionId" visible-columns="TaskName" separator=" - "
                  width="680px">
                </o-table-cell-renderer-service>
              </o-table-column>

              <o-table-column #AssignedTo attr="AssignedTo" title="AssignedTo" editable="no" required="no"
                content-align="left"></o-table-column>

              <o-table-column #StartedDate attr="StartedDate" title="StartedDate" type="DATETIME2" editable="no"
                required="no"></o-table-column>

              <o-table-column #CompletedDate attr="CompletedDate" title="CompletedDate" type="DATETIME2" editable="no"
                required="no"></o-table-column>

              <o-table-column #DurationMinutes attr="DurationMinutes" title="DurationMinutes" type="integer"
                editable="no" required="no" content-align="center"></o-table-column>

              <o-table-column #Result attr="Result" title="Result" editable="no" required="no"
                content-align="left"></o-table-column>

              <o-table-column #ResultData attr="ResultData" title="ResultData" editable="no" required="no"
                content-align="left"></o-table-column>

              <o-table-column #ErrorMessage attr="ErrorMessage" title="ErrorMessage" editable="no" required="no"
                content-align="left"></o-table-column>

              <o-table-column #RetryCount attr="RetryCount" title="RetryCount" type="integer" editable="no"
                required="no" content-align="center"></o-table-column>

              <o-table-column #ModifiedDate attr="ModifiedDate" title="ModifiedDate" type="DATETIME2" editable="no"
                required="no"></o-table-column>

              <o-table-paginator page-size-options="25;50;100"></o-table-paginator>
            </o-table>
          </div>
        </mat-tab>

      </mat-tab-group>

    </o-form>
  </o-form-container>
</div>
