<o-form-layout-manager attr="ProducedIn1Tb" mode="tab" title="PRODUCEDIN1TB">
    <div fxFill fxLayout="column" fxLayoutAlign="start">
        <o-table 
            attr="ProducedIn1TbTable" 
            service="ProducedIn1Tb" 
            entity="ProducedIn1Tb" 
            title="PRODUCEDIN1TB"
            keys="ID"
            columns="ID;PROC_LINE_ID;START_DATE;END_DATE;REGULAR;SPECIAL;PASSOVER;PRIVATE_LABEL_FEE;TIMESTAMP;STATUS;SPECIAL_STATUS_1;RC_1;DATE_1;SPECIAL_STATUS_2;RC_2;DATE_2;SPECIAL_STATUS_3;RC_3;DATE_3;VERSION;ACTIVE;LabelID;OWNS_ID;DIST;FeeAmount;InvoiceAmount;ValidFromTime;ValidToTime;CHANGESET_ID;FormulaSubmissionPlantID" 
            header-actions="R;D"
            visible-columns="ID;PROC_LINE_ID;START_DATE;END_DATE;REGULAR;SPECIAL;PASSOVER;PRIVATE_LABEL_FEE;TIMESTAMP;STATUS;SPECIAL_STATUS_1;RC_1;DATE_1;SPECIAL_STATUS_2;RC_2;DATE_2;SPECIAL_STATUS_3;RC_3;DATE_3;VERSION;ACTIVE;LabelID;OWNS_ID;DIST;FeeAmount;InvoiceAmount;ValidFromTime;ValidToTime;CHANGESET_ID;FormulaSubmissionPlantID"  
            sort-columns="ID" 
            query-rows="20" 
            quick-filter="yes"
            row-height="medium" 
            select-all-checkbox="true" 
            pageable="yes"  
            auto-adjust="true" 
            virtual-scroll="yes" 
            edition-mode="dblclick"
            horizontal-scroll="yes"
            show-title="yes"
            export-button="yes">
            
            <o-table-column #ID attr="ID" title="Production ID" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
            
            <o-table-column #PROC_LINE_ID attr="PROC_LINE_ID" title="PROC_LINE_ID" type="integer" editable="no" required="no" content-align="center"></o-table-column>
            
            <o-table-column #START_DATE attr="START_DATE" title="START_DATE" type="DATETIME" editable="no" required="no" ></o-table-column>
            
            <o-table-column #END_DATE attr="END_DATE" title="END_DATE" type="DATETIME" editable="no" required="no" ></o-table-column>
            
            <o-table-column #REGULAR attr="REGULAR" title="REGULAR" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #SPECIAL attr="SPECIAL" title="SPECIAL" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #PASSOVER attr="PASSOVER" title="PASSOVER" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #PRIVATE_LABEL_FEE attr="PRIVATE_LABEL_FEE" title="PRIVATE_LABEL_FEE" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #TIMESTAMP attr="TIMESTAMP" title="TIMESTAMP" type="BINARY" editable="no" required="no" ></o-table-column>
            
            <o-table-column #STATUS attr="STATUS" title="STATUS" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #SPECIAL_STATUS_1 attr="SPECIAL_STATUS_1" title="SPECIAL_STATUS_1" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #RC_1 attr="RC_1" title="RC_1" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #DATE_1 attr="DATE_1" title="DATE_1" type="DATETIME" editable="no" required="no" ></o-table-column>
            
            <o-table-column #SPECIAL_STATUS_2 attr="SPECIAL_STATUS_2" title="SPECIAL_STATUS_2" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #RC_2 attr="RC_2" title="RC_2" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #DATE_2 attr="DATE_2" title="DATE_2" type="DATETIME" editable="no" required="no" ></o-table-column>
            
            <o-table-column #SPECIAL_STATUS_3 attr="SPECIAL_STATUS_3" title="SPECIAL_STATUS_3" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #RC_3 attr="RC_3" title="RC_3" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #DATE_3 attr="DATE_3" title="DATE_3" type="DATETIME" editable="no" required="no" ></o-table-column>
            
            <o-table-column #VERSION attr="VERSION" title="VERSION" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #ACTIVE attr="ACTIVE" title="ACTIVE" type="integer" editable="no" required="no" content-align="center"></o-table-column>
            
            <o-table-column attr="LabelID" title="LabelID">
    <o-table-cell-renderer-service attr="LabelID" 
        service="LabelTb" entity="LabelTbType" columns="ID;LABEL_NAME"
        parent-keys="ID:LabelID"
        value-column="LABEL_NAME" keys="LabelID"
        visible-columns="LABEL_NAME" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
            
            <o-table-column attr="OWNS_ID" title="OWNS_ID">
    <o-table-cell-renderer-service attr="OWNS_ID" 
        service="OWNSTB" entity="OWNSTBType" columns="ID;ID"
        parent-keys="ID:OWNS_ID"
        value-column="ID" keys="OWNS_ID"
        visible-columns="ID" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
            
            <o-table-column attr="DIST" title="DIST">
    <o-table-cell-renderer-boolean render-true-value="check_circle" render-false-value="highlight_off"
        render-type="icon" boolean-type="boolean" true-value="true" false-value="false"></o-table-cell-renderer-boolean>
</o-table-column>
            
            <o-table-column #FeeAmount attr="FeeAmount" title="FeeAmount" type="currency" editable="no" required="no" currency-symbol="$" currency-symbol-position="left" thousand-separator=","decimal-separator="."></o-table-column>
            
            <o-table-column #InvoiceAmount attr="InvoiceAmount" title="InvoiceAmount" type="currency" editable="no" required="no" currency-symbol="$" currency-symbol-position="left" thousand-separator=","decimal-separator="."></o-table-column>

            <o-table-column attr="FormulaSubmissionPlantID" title="FormulaSubmissionPlantID">
    <o-table-cell-renderer-service attr="FormulaSubmissionPlantID" 
        service="FormulaSubmissionPlant" entity="FormulaSubmissionPlantType" columns="ID;PlantName"
        parent-keys="ID:FormulaSubmissionPlantID"
        value-column="PlantName" keys="FormulaSubmissionPlantID"
        visible-columns="PlantName" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
            
            <o-table-context-menu></o-table-context-menu>
            <o-table-paginator page-size-options="24;48;96"></o-table-paginator>
        </o-table>
    </div>
</o-form-layout-manager>
