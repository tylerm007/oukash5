<div class="container">
<o-form-container breadcrumb="yes" breadcrumb-label-columns="ProductName" breadcrumb-separator=", " class="fill-form">
      <o-form #form attr="FormulaProduct_form_edit" 
        service="FormulaProduct" 
        entity="FormulaProduct" 
        fxLayout="column" 
        show-header="yes" 
        header-actions="R;U;D"
        #oDetailForm keys="ID" 
        keys-sql-types="INTEGER" 
        show-header-navigation="yes"
        (onDataLoaded)="onDataLoaded($event)">

  <o-row attr="row1" layout-align="start stretch">
    <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">
      
      <o-text-input #ProductName attr="ProductName" label="Product Name" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #ID attr="ID" label="ID" type="integer" editable="no" required="yes" ></o-integer-input>
      
      <o-text-input #FormulaSubmissionID attr="FormulaSubmissionID" label="FormulaSubmissionID" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
    </div>
  </o-row>
      
    </o-form>
  </o-form-container>
</div>
