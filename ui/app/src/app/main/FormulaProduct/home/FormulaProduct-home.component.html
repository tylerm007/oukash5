<o-form-layout-manager attr="FormulaProduct" mode="dialog" title="FORMULAPRODUCT">
    <div fxFill fxLayout="column" fxLayoutAlign="start">
        <o-table 
            attr="FormulaProductTable" 
            service="FormulaProduct" 
            entity="FormulaProduct" 
            title="FORMULAPRODUCT"
            keys="ID"
            columns="ProductName;ID;FormulaSubmissionID" 
            header-actions="R;D"
            visible-columns="ProductName;ID;FormulaSubmissionID"  
            sort-columns="ProductName" 
            query-rows="20" 
            quick-filter="yes"
            row-height="medium" 
            select-all-checkbox="true" 
            pageable="yes"  
            auto-adjust="true" 
            virtual-scroll="yes" 
            edition-mode="dblclick"
            horizontal-scroll="yes"
            show-title="yes"
            export-button="yes">
            
            <o-table-column #ProductName attr="ProductName" title="Product Name" editable="no" required="yes" content-align="left"></o-table-column>
            
            <o-table-column #ID attr="ID" title="ID" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
            
            <o-table-column #FormulaSubmissionID attr="FormulaSubmissionID" title="FormulaSubmissionID" editable="no" required="yes" content-align="left"></o-table-column>
            
            <o-table-context-menu></o-table-context-menu>
            <o-table-paginator page-size-options="75;125;150"></o-table-paginator>
        </o-table>
    </div>
</o-form-layout-manager>
