<div class="container">
<o-form-container breadcrumb="yes" breadcrumb-label-columns="MessageTypeDescription" breadcrumb-separator=", " class="fill-form">
      <o-form #form attr="ProcessMessageType_form_edit" 
        service="ProcessMessageType" 
        entity="ProcessMessageType" 
        fxLayout="column" 
        show-header="yes" 
        header-actions="R;U;D"
        #oDetailForm keys="MessageTypeCode" 
        keys-sql-types="VARCHAR" 
        show-header-navigation="yes"
        (onDataLoaded)="onDataLoaded($event)">

  <o-row attr="row1" layout-align="start stretch">
    <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">
      
      <o-text-input #MessageTypeDescription attr="MessageTypeDescription" label=" Message Type Description" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #MessageTypeCode attr="MessageTypeCode" label="MessageTypeCode" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
    </div>
  </o-row>
      
    </o-form>
  </o-form-container>
</div>
