<o-form-layout-manager attr="USEDIN1TB" mode="tab" title="USEDIN1TB">
    <div fxFill fxLayout="column" fxLayoutAlign="start">
        <o-table 
            attr="USEDIN1TBTable" 
            service="USEDIN1TB" 
            entity="USEDIN1TB" 
            title="USEDIN1TB"
            keys="ID"
            columns="ID;LabelID;UsedInID;START_DATE;END_DATE;ACTIVE;STATUS;ValidFromTime;ValidToTime;CHANGESET_ID" 
            header-actions="R;D"
            visible-columns="ID;LabelID;UsedInID;START_DATE;END_DATE;ACTIVE;STATUS;ValidFromTime;ValidToTime;CHANGESET_ID"  
            sort-columns="ID" 
            query-rows="20" 
            quick-filter="yes"
            row-height="medium" 
            select-all-checkbox="true" 
            pageable="yes"  
            auto-adjust="true" 
            virtual-scroll="yes" 
            edition-mode="dblclick"
            horizontal-scroll="yes"
            show-title="yes"
            export-button="yes">
            
            <o-table-column #ID attr="ID" title="Used In ID" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
            
            <o-table-column attr="LabelID" title="LabelID">
    <o-table-cell-renderer-service attr="LabelID" 
        service="LabelTb" entity="LabelTbType" columns="ID;LABEL_NAME"
        parent-keys="ID:LabelID"
        value-column="LABEL_NAME" keys="LabelID"
        visible-columns="LABEL_NAME" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
            
            <o-table-column #UsedInID attr="UsedInID" title="UsedInID" editable="no" required="yes" content-align="left"></o-table-column>
            
            <o-table-column #START_DATE attr="START_DATE" title="START_DATE" type="SMALLDATETIME" editable="no" required="no" ></o-table-column>
            
            <o-table-column #END_DATE attr="END_DATE" title="END_DATE" type="DATETIME" editable="no" required="no" ></o-table-column>
            
            <o-table-column #ACTIVE attr="ACTIVE" title="ACTIVE" type="integer" editable="no" required="no" content-align="center"></o-table-column>
            
            <o-table-column #STATUS attr="STATUS" title="STATUS" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #ValidFromTime attr="ValidFromTime" title="ValidFromTime" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #ValidToTime attr="ValidToTime" title="ValidToTime" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #CHANGESET_ID attr="CHANGESET_ID" title="CHANGESET_ID" type="integer" editable="no" required="no" content-align="center"></o-table-column>
            
            <o-table-context-menu></o-table-context-menu>
            <o-table-paginator page-size-options="24;48;96"></o-table-paginator>
        </o-table>
    </div>
</o-form-layout-manager>
