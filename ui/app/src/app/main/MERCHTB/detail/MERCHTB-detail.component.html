<div class="container">
<o-form-container breadcrumb="yes" breadcrumb-label-columns="NAME" breadcrumb-separator=", " class="fill-form">
      <o-form #form attr="MERCHTB_form_edit" 
        service="MERCHTB" 
        entity="MERCHTB" 
        fxLayout="column" 
        show-header="yes" 
        header-actions="R;U;D"
        #oDetailForm keys="MERCHANDISE_ID" 
        keys-sql-types="INTEGER" 
        show-header-navigation="yes"
        (onDataLoaded)="onDataLoaded($event)">

  <o-row attr="row1" layout-align="start stretch">
    <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">
      
      <o-text-input #NAME attr="NAME" label="Merchandise Name" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #MERCHANDISE_ID attr="MERCHANDISE_ID" label="MERCHANDISE_ID" type="integer" editable="no" required="yes" ></o-integer-input>
      
      <o-list-picker 
        attr="COMPANY_ID"
        service="COMPANYTB" 
        entity="COMPANYTBType"
        fxFlex="30" 
        query-on-init="no" 
        query-on-bind="yes" 
        required="yes" 
        enabled="yes" 
        filter="yes"
        value-column="COMPANY_ID" 
        value-column-type="INTEGER"  
        keys="COMPANY_ID" 
        columns="COMPANY_ID;COMPANY_ID;NAME" 
        title="COMPANY_ID"
        visible-columns="COMPANY_ID;NAME" 
        separator=" - " width="680px" class="form-field">
</o-list-picker>
      
      <o-text-input #RMC attr="RMC" label="RMC" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #ACTIVE attr="ACTIVE" label="ACTIVE" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-text-input #STATUS attr="STATUS" label="STATUS" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #TIMESTAMP attr="TIMESTAMP" label="TIMESTAMP" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-list-picker 
        attr="PrimaryLabelID"
        service="LabelTb" 
        entity="LabelTbType"
        fxFlex="30" 
        query-on-init="no" 
        query-on-bind="yes" 
        required="no" 
        enabled="yes" 
        filter="yes"
        value-column="ID" 
        value-column-type="INTEGER"  
        keys="ID" 
        columns="ID;PrimaryLabelID;LABEL_NAME" 
        title="PrimaryLabelID"
        visible-columns="ID;LABEL_NAME" 
        separator=" - " width="680px" class="form-field">
</o-list-picker>
      
      <o-text-input #Category attr="Category" label="Category" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #ValidFromTime attr="ValidFromTime" label="ValidFromTime" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #ValidToTime attr="ValidToTime" label="ValidToTime" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #CHANGESET_ID attr="CHANGESET_ID" label="CHANGESET_ID" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-text-input #IsPrimary attr="IsPrimary" label="IsPrimary" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #SecondaryCategory attr="SecondaryCategory" label="SecondaryCategory" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
    </div>
  </o-row>
      
      <mat-tab-group fxFill>
        
        <mat-tab label="FORMULASUBMISSIONCOMPONENT-ComponentMerchID">
    <div layout-padding>
      <o-table 
        attr="FormulaSubmissionComponentTable" 
        service="FormulaSubmissionComponent" 
        entity="FormulaSubmissionComponent" 
        keys="ID"
        parent-keys="ComponentMerchID:MERCHANDISE_ID"
        columns="ComponentName;ID;FormulaSubmissionID;UniqueID;RMC;ProductNumber;ComponentMerchID;ComponentLabelID;ComponentDescription;IngredientStatement;ActionTaken;CreatedDate;ModifiedDate"  
        horizontal-scroll="yes"
        detail-form-route="FormulaSubmissionComponent" 
        edit-form-route="FormulaSubmissionComponent"
        visible-columns="ComponentName;ID;FormulaSubmissionID;UniqueID;RMC;ProductNumber;ComponentMerchID;ComponentLabelID;ComponentDescription;IngredientStatement;ActionTaken;CreatedDate;ModifiedDate"  
        sort-columns="ComponentName" 
        query-rows="25" 
        quick-filter="yes"
        row-height="medium" 
        select-all-checkbox="true" 
        pageable="yes"  
        auto-adjust="true" 
        virtual-scroll="yes" 
        insert-button="yes" 
        delete-button="yes" 
        fixed-header="true" 
        class="vertical-padding-8"
        edition-mode="dblclick" 
        horizontal-scroll="yes" class="fill-form">
        
          <o-table-column #ComponentName attr="ComponentName" title="Component Name" editable="no" required="yes" content-align="left"></o-table-column>
        
          <o-table-column #ID attr="ID" title="ID" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
        
          <o-table-column #FormulaSubmissionID attr="FormulaSubmissionID" title="FormulaSubmissionID" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
        
          <o-table-column #UniqueID attr="UniqueID" title="UniqueID" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #RMC attr="RMC" title="RMC" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #ProductNumber attr="ProductNumber" title="ProductNumber" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column attr="ComponentMerchID" title="ComponentMerchID">
    <o-table-cell-renderer-service attr="ComponentMerchID" 
        service="MERCHTB" entity="MERCHTBType" columns="MERCHANDISE_ID;NAME"
        parent-keys="MERCHANDISE_ID:ComponentMerchID"
        value-column="NAME" keys="ComponentMerchID"
        visible-columns="NAME" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
        
          <o-table-column attr="ComponentLabelID" title="ComponentLabelID">
    <o-table-cell-renderer-service attr="ComponentLabelID" 
        service="LabelTb" entity="LabelTbType" columns="ID;LABEL_NAME"
        parent-keys="MERCHANDISE_ID:ComponentLabelID"
        value-column="LABEL_NAME" keys="ComponentLabelID"
        visible-columns="LABEL_NAME" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
        
          <o-table-column #ComponentDescription attr="ComponentDescription" title="ComponentDescription" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #IngredientStatement attr="IngredientStatement" title="IngredientStatement" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #ActionTaken attr="ActionTaken" title="ActionTaken" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #CreatedDate attr="CreatedDate" title="CreatedDate" type="text" editable="no" required="no" ></o-table-column>
        
          <o-table-column #ModifiedDate attr="ModifiedDate" title="ModifiedDate" type="text" editable="no" required="no" ></o-table-column>
        
        <o-table-paginator page-size-options="25;50;100"></o-table-paginator>
      </o-table>
    </div>
</mat-tab>
        
      </mat-tab-group>
      
    </o-form>
  </o-form-container>
</div>
