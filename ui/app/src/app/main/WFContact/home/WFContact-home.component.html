<o-form-layout-manager attr="WFContact" mode="tab" title="WFCONTACT">
    <div fxFill fxLayout="column" fxLayoutAlign="start">
        <o-table 
            attr="WFContactTable" 
            service="WFContact" 
            entity="WFContact" 
            title="WFCONTACT"
            keys="ContactID"
            columns="ContactName;ApplicationID;Title;ContactPhone;ContactEmail;IsPrimary;CreatedDate;ContactID" 
            header-actions="R;D"
            visible-columns="ContactName;ApplicationID;Title;ContactPhone;ContactEmail;IsPrimary;CreatedDate;ContactID"  
            sort-columns="ContactName" 
            query-rows="20" 
            quick-filter="yes"
            row-height="medium" 
            select-all-checkbox="true" 
            pageable="yes"  
            auto-adjust="true" 
            virtual-scroll="yes" 
            edition-mode="dblclick"
            horizontal-scroll="yes"
            show-title="yes"
            export-button="yes">
            
            <o-table-column #ContactName attr="ContactName" title=" Contact Name" editable="no" required="yes" content-align="left"></o-table-column>
            
            <o-table-column attr="ApplicationID" title="ApplicationID">
    <o-table-cell-renderer-service attr="ApplicationID" 
        service="WFApplication" entity="WFApplicationType" columns="ApplicationID;ApplicationID"
        parent-keys="ContactID:ApplicationID"
        value-column="ApplicationID" keys="ApplicationID"
        visible-columns="ApplicationID" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
            
            <o-table-column #Title attr="Title" title="Title" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #ContactPhone attr="ContactPhone" title="ContactPhone" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column #ContactEmail attr="ContactEmail" title="ContactEmail" editable="no" required="no" content-align="left"></o-table-column>
            
            <o-table-column attr="IsPrimary" title="IsPrimary">
    <o-table-cell-renderer-boolean render-true-value="check_circle" render-false-value="highlight_off"
        render-type="icon" boolean-type="boolean" true-value="true" false-value="false"></o-table-cell-renderer-boolean>
</o-table-column>
            
            <o-table-column #CreatedDate attr="CreatedDate" title="CreatedDate" type="DATETIME2" editable="no" required="yes" ></o-table-column>
            
            <o-table-column #ContactID attr="ContactID" title="ContactID" type="integer" editable="no" required="no" content-align="center"></o-table-column>
            
            <o-table-context-menu></o-table-context-menu>
            <o-table-paginator page-size-options="24;48;96"></o-table-paginator>
        </o-table>
    </div>
</o-form-layout-manager>
