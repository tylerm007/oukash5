<div class="container">
<o-form-container breadcrumb="yes" breadcrumb-label-columns="UserName" breadcrumb-separator=", " class="fill-form">
      <o-form #form attr="WFUserAdmin_form_edit" 
        service="WFUserAdmin" 
        entity="WFUserAdmin" 
        fxLayout="column" 
        show-header="yes" 
        header-actions="R;U;D"
        #oDetailForm keys="UserName;AdminUserName" 
        keys-sql-types="VARCHAR;VARCHAR" 
        show-header-navigation="yes"
        (onDataLoaded)="onDataLoaded($event)">

  <o-row attr="row1" layout-align="start stretch">
    <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">
      
      <o-list-picker 
        attr="UserName"
        service="WFUser" 
        entity="WFUserType"
        fxFlex="30" 
        query-on-init="no" 
        query-on-bind="yes" 
        required="yes" 
        enabled="yes" 
        filter="yes"
        value-column="Username" 
        value-column-type="VARCHAR"  
        keys="Username" 
        columns="Username;UserName;Username" 
        title="UserName"
        visible-columns="Username;Username" 
        separator=" - " width="680px" class="form-field">
</o-list-picker>
      
      <o-list-picker 
        attr="AdminUserName"
        service="WFUser" 
        entity="WFUserType"
        fxFlex="30" 
        query-on-init="no" 
        query-on-bind="yes" 
        required="yes" 
        enabled="yes" 
        filter="yes"
        value-column="Username" 
        value-column-type="VARCHAR"  
        keys="Username" 
        columns="Username;AdminUserName;Username" 
        title="AdminUserName"
        visible-columns="Username;Username" 
        separator=" - " width="680px" class="form-field">
</o-list-picker>
      
      <o-checkbox #IsPrimary attr="IsPrimary" label="IsPrimary" read-only="no" enabled="yes"></o-checkbox>
      
      <o-date-input #CreatedDate attr="CreatedDate" value-type="string" label="CreatedDate" editable="no" required="yes" format="YYYY-MM-DD hh:mm:ss" fxFlex="20%" class="form-field"></o-date-input>
      
    </div>
  </o-row>
      
      <mat-tab-group fxFill>
        
      </mat-tab-group>
      
    </o-form>
  </o-form-container>
</div>
